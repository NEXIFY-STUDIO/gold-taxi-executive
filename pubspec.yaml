name: goldtaxi_bolt_v2_5
description: GoldTaxi v2.5 - production-ready Bolt-style ride-hailing Flutter UI/UX starter.
publish_to: "none"
version: 2.5.0+25

environment:
  sdk: ">=3.3.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  firebase_core: ^4.11.0
  firebase_auth: ^6.1.2
  cloud_functions: ^6.0.2
  firebase_messaging: ^16.0.4
  cloud_firestore: ^6.0.0
  http: ^1.2.2
  web: ^1.1.1
  google_fonts: ^8.1.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  integration_test:
    sdk: flutter
  flutter_lints: ^3.0.2
  flutter_launcher_icons: ^0.14.4

flutter:
  uses-material-design: true
  assets:
    - assets/icons/
    - assets/images/
    - assets/branding/

flutter_launcher_icons:
  android: true
  ios: true
  image_path: assets/branding/app_icon.png
  adaptive_icon_background: "#0A0A0A"
  adaptive_icon_foreground: assets/branding/app_icon.png
  min_sdk_android: 21
  remove_alpha_ios: true
